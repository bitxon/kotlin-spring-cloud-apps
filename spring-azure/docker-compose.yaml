services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    restart: always
    ports:
      - "10000:10000" # Blob service
      - "10001:10001" # Queue service
      - "10002:10002" # Table service
    command: "azurite --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"

  cosmosdb:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-latest
    container_name: cosmosdb
    restart: always
    ports:
      - "8081:8081"   # Azure Cosmos DB emulator
      - "1234:1234"   # Data explorer
    volumes:
      - "./src/test/resources/configs/cosmosdb-init:/init"
    environment:
      PROTOCOL: http
      ENABLE_EXPLORER: true
      EXPLORER_PROTOCOL: http
      LOG_LEVEL: trace
      ENABLE_INIT_DATA: "true"

  eventhub:
    image: "mcr.microsoft.com/azure-messaging/eventhubs-emulator:latest"
    container_name: eventhub
    restart: always
    volumes:
      - "./src/test/resources/configs/eventhub.json:/Eventhubs_Emulator/ConfigFiles/Config.json"
    ports:
      - "5672:5672"
      - "9092:9092"
    environment:
      BLOB_SERVER: azurite
      METADATA_SERVER: azurite
      ACCEPT_EULA: "Y"
    depends_on:
      - azurite

