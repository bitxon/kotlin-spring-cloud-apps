services:
  floci:
    image: hectorvent/floci:1.5.2-aws
    container_name: floci
    ports:
      - "127.0.0.1:4566:4566"
    volumes:
      - "./src/test/resources/scripts:/etc/floci/init/start.d"

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: dynamodb-admin
    environment:
      - DYNAMO_ENDPOINT=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    ports:
      - "8001:8001"
    depends_on:
      - floci
